name: Revalidate ISR WarmUp
on:
  schedule:
    - cron: '5 0 * * *'   # Every day at 00:05 UTC
    - cron: '5 12 * * *'  # Every day at 12:05 UTC
  workflow_dispatch:      # Manual trigger if needed

jobs:
  call-warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ISR warm-up endpoint
        env:
          PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL || 'https://anime-tracker-next-js.vercel.app' }}
        run: |
          # Use a timeout of 30 seconds and retry up to 2 times on failures
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            "$PRODUCTION_BASE_URL/api/cron/isr_warmUp/warmUp")
          
          echo "HTTP Response Code: $response"
          
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "[OK] ISR warm-up successful"
          else
            echo "[FAILED] ISR warm-up failed with HTTP $response"
            exit 1
          fi